    <title>RAPS | Sistem Absensi & Penggajian - PT. Redone Berkah Mandiri Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#fef2f2',
                100: '#fee2e2',
                200: '#fecaca',
                300: '#fca5a5',
                400: '#f87171',
                500: '#ef4444',
                600: '#dc2626', // Red Primary
                700: '#b91c1c',
                800: '#991b1b',
                900: '#7f1d1d',
                950: '#450a0a',
              },
              slate: {
                850: '#151e2e', // Custom between 800 and 900
              },
              dark: {
                bg: '#020617',      // Slate 950
                surface: '#0f172a', // Slate 900
                card: '#1e293b',    // Slate 800
                border: '#334155',  // Slate 700
                muted: '#94a3b8',   // Slate 400
                text: '#f8fafc',    // Slate 50
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(10px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020617; /* Slate 950 */
        color: #f8fafc; /* Slate 50 */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: none;
      }
      /* Custom Scrollbar for Dark Mode */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; /* Slate 700 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; /* Slate 600 */
      }
      
      .glass-card {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(51, 65, 85, 0.5);
      }
      
      input[type="date"] {
        position: relative;
        color-scheme: dark;
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6; 
        filter: invert(1);
        margin-right: 4px;
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        background-color: #334155;
        border-radius: 4px;
        opacity: 1;
      }
    </style>

</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('PWA ServiceWorker registered: ', registration);
            })
            .catch(registrationError => {
              console.log('PWA ServiceWorker registration failed: ', registrationError);
            });
            
          // Handle updates
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
             if (refreshing) return;
             refreshing = true;
             window.location.reload();
          });
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
